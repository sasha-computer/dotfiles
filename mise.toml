[settings]
dotfiles.root = "~/.dotfiles"
experimental = true

# Homebrew packages (formulae + casks) are managed via Brewfile
# https://docs.brew.sh/Brew-Bundle-and-Brewfile
# Run `brew bundle install --file ~/src/github.com/sasha-computer/dotfiles/Brewfile`
# Run `brew bundle cleanup --file ~/src/github.com/sasha-computer/dotfiles/Brewfile` to prune

# Hooks run at named points in the bootstrap sequence
# https://mise.jdx.dev/bootstrap.html#hooks
# Clone LazyVim before dotfiles are applied (idempotent)
[bootstrap.hooks.pre-dotfiles]
run = "test -d $HOME/.config/nvim || (git clone https://github.com/LazyVim/starter $HOME/.config/nvim && rm -rf $HOME/.config/nvim/.git)"

# Restart Dock/Finder after defaults change
[bootstrap.hooks.post-defaults]
run = "killall Dock || true; killall Finder || true"

# Managed dotfiles
# https://mise.jdx.dev/dotfiles.html
[dotfiles]
"~/.dotfiles" = "~/src/github.com/sasha-computer/dotfiles"
"~/.gitconfig" = "~/.dotfiles/dot_gitconfig"
"~/.ssh/config" = "~/.dotfiles/dot_ssh/config"
"~/.config/fish/" = { source = "~/.dotfiles/dot_config/fish/", mode = "symlink-each" }
"~/.config/ghostty/" = { source = "~/.dotfiles/dot_config/ghostty/", mode = "symlink-each" }
"~/.config/zed/" = { source = "~/.dotfiles/dot_config/zed/", mode = "symlink-each" }
"~/.config/opencode/" = { source = "~/.dotfiles/dot_config/opencode/", mode = "symlink-each" }
"~/.config/raycast/" = { source = "~/.dotfiles/dot_config/raycast/", mode = "symlink-each" }
"~/.config/mise/config.toml" = "~/src/github.com/sasha-computer/dotfiles/mise.toml"
"~/.agents/skills/" = { source = "~/.dotfiles/dot_agents/skills/", mode = "symlink-each" }

# macOS preferences
# https://mise.jdx.dev/bootstrap/macos-defaults.html
[bootstrap.macos.dock]
autohide = true
show_recents = false

[bootstrap.macos.finder]
show_all_files = true
show_pathbar = true
show_status_bar = true
preferred_view_style = "column"
show_extensions_warning = false

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 25
press_and_hold = false

[bootstrap.macos.trackpad]
tap_to_click = true

[bootstrap.macos.defaults]
"NSGlobalDomain" = { NSAutomaticCapitalizationEnabled = false, NSAutomaticDashSubstitutionEnabled = false, NSAutomaticPeriodSubstitutionEnabled = false, NSAutomaticQuoteSubstitutionEnabled = false, NSAutomaticSpellingCorrectionEnabled = false }
"com.apple.finder" = { FXDefaultSearchScope = "SCcf", WarnOnEmptyTrash = false, FXRemoveOldTrashItems = true }
"com.apple.menuextra.battery" = { ShowPercent = true }

# User login shell
# https://mise.jdx.dev/bootstrap/user.html
[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

# Runs after tools are installed during mise bootstrap
# https://mise.jdx.dev/bootstrap.html#how-it-runs
[tasks.bootstrap]
run = [
  "brew bundle install --file ~/src/github.com/sasha-computer/dotfiles/Brewfile",
  "fish ~/src/github.com/sasha-computer/dotfiles/scripts/bootstrap.fish",
  "uv tool install vastai",
]

[tools]
rust = "stable"
"npm:ctx7" = "latest"
